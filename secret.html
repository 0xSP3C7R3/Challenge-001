<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECRET Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .navbar {
            background: #111827;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            margin: 0;
            font-size: 18px;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .card p {
            font-size: 14px;
            color: #94a3b8;
        }

        .sidebar {
            margin-top: 20px;
            background: #111827;
            padding: 15px;
            border-radius: 10px;
        }

        .sidebar a {
            display: block;
            color: #e2e8f0;
            text-decoration: none;
            margin: 8px 0;
        }

        .sidebar a:hover {
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>Secret Dashboard</h1>
        <span>Welcome, User</span>
    </div>

    <div class="container">

        <div class="cards">
            <div class="card">
                <h2>Users</h2>
                <p>Manage registered users</p>
            </div>

            <div class="card">
                <h2>Posts</h2>
                <p>Manage content/posts</p>
            </div>

            <div class="card">
                <h2>Settings</h2>
                <p>System configuration</p>
            </div>
        </div>

        <div class="sidebar">
            <h3>Quick Links</h3>
            <a href="#">Dashboard</a>
            <a href="#">Manage Users</a>
            <a href="#">Reports</a>
            <a href="#">Logout</a>
        </div>

    </div>

</body>

</html>
